<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参加案内</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: #f7fafc;
            color: #333;
            line-height: 1.8;
            padding: 40px 20px;
        }

        .box {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 2rem;
            color: #2b4f81;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 14px;
            font-size: 1.05rem;
        }

        .button {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 22px;
            background-color: #4f8cff;
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #3a73d9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>参加案内</h1>
        <p>参加したい方はInstagramのDMから連絡してください。</p>
        <p>見学だけでも歓迎しています。お気軽にお問い合わせください。</p>

        <a href="index.html" class="button">トップページに戻る</a>
    </div>
</body>
</html>
